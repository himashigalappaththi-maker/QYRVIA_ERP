name: CI

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: server

jobs:
  # Mode 1 (existing): in-memory unit tests. No database.
  unit:
    name: Unit (in-memory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Unit tests (in-memory fakes)
        run: npm run test:unit

  # Mode 2 (Phase 9.1, NEW): real PostgreSQL integration tests.
  db:
    name: Integration (real PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qyrvia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d qyrvia_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qyrvia_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qyrvia_test
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-padding
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Verify migration chain applies cleanly (0001..NNNN)
        run: node src/db/migrate.js up
      - name: DB-backed integration tests (RLS, constraints, finance flows)
        run: npm run test:db

  # Mode 3 (Phase 19, NEW): Stitch frontend logic tests (no DB, no build/deps).
  frontend:
    name: Frontend (Stitch UI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-stitch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Frontend unit tests (apiClient / session / rbac / router)
        run: npm test
