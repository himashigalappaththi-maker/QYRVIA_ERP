name: CI

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: server

jobs:
  # Mode 1 (existing): in-memory unit tests. No database.
  unit:
    name: Unit (in-memory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Unit tests (in-memory fakes)
        run: npm run test:unit

  # Mode 2 (real PostgreSQL): RLS-AWARE integration tests.
  #
  # Tenant isolation is a first-class, enforced constraint here:
  #   - tests connect as a NON-superuser role (qyrvia_test); a superuser bypasses
  #     RLS (FORCE included), so the suite NEVER runs as the postgres superuser;
  #   - the postgres superuser is used ONCE, only to provision that restricted
  #     role (scripts/ci-provision-db.js) - never to test RLS;
  #   - an RLS preflight gate (scripts/rls-preflight.js) STOPS the job before the
  #     suite if the connection is superuser/BYPASSRLS, FORCE RLS is missing,
  #     PUBLIC leaks UPDATE/DELETE on append-only tables, or a cross-tenant leak
  #     is observed;
  #   - the in-suite guard (test/db/rls_guard.db.test.js) fails the suite on any
  #     of the same regressions.
  # No Docker fallback DB, no temporary cluster, no SET ROLE / superuser hacks.
  db:
    name: Integration (real PostgreSQL, RLS-aware)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qyrvia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d qyrvia_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      # The suite connects ONLY as the non-superuser role. The superuser URL is
      # scoped to the provisioning step alone (below).
      TEST_DATABASE_URL: postgresql://qyrvia_test:qyrvia_test_ci_pw@localhost:5432/qyrvia_test
      DATABASE_URL: postgresql://qyrvia_test:qyrvia_test_ci_pw@localhost:5432/qyrvia_test
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-padding
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Provision non-superuser RLS role (superuser used ONLY here)
        run: npm run db:provision
        env:
          SUPERUSER_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qyrvia_test
          APP_ROLE: qyrvia_test
          APP_ROLE_PASSWORD: qyrvia_test_ci_pw
      - name: Verify migration chain applies cleanly (as qyrvia_test, on fresh schema)
        run: node src/db/migrate.js up
      - name: RLS preflight gate (STOP on superuser / FORCE-RLS / leak)
        run: npm run db:preflight
      - name: DB-backed integration tests (RLS guard, isolation, constraints, finance)
        run: npm run test:db

  # Mode 3 (Phase 19, NEW): Stitch frontend logic tests (no DB, no build/deps).
  frontend:
    name: Frontend (Stitch UI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-stitch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Frontend unit tests (apiClient / session / rbac / router)
        run: npm test
