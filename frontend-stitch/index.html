<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QYRVIA ERP</title>

  <!-- Stitch design system: fonts + icons + Tailwind -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    // Stitch "Functional Luxury" tokens (gold #775a19 / charcoal / slate).
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#f8f9fa', surface: '#ffffff',
            'surface-container': '#edeeef', 'surface-container-high': '#e7e8e9',
            'on-surface': '#191c1d', 'on-surface-variant': '#4e4639',
            outline: '#7f7667', 'outline-variant': '#d1c5b4',
            primary: '#775a19', 'on-primary': '#ffffff',
            'primary-container': '#c5a059', 'on-primary-container': '#4e3700',
            charcoal: '#2d3436', slate: '#556064',
            secondary: '#586062', error: '#ba1a1a', 'error-container': '#ffdad6',
            success: '#3b7d4f'
          },
          fontFamily: { display: ['"Hanken Grotesk"', 'sans-serif'], body: ['Inter', 'sans-serif'] },
          borderRadius: { lg: '12px', xl: '16px' },
          boxShadow: { card: '0 4px 20px rgba(45,52,54,0.05)', modal: '0 8px 30px rgba(45,52,54,0.12)' }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="./src/styles/theme.css" />
</head>
<body class="bg-background font-body text-on-surface antialiased">
  <div id="app" class="min-h-screen"></div>
  <div id="toast-root" class="fixed top-4 right-4 z-50 space-y-2"></div>
  <script type="module" src="./src/app/app.js"></script>
</body>
</html>
