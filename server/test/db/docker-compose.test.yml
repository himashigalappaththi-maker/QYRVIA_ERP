# Phase 9.1 - local PostgreSQL for DB-mode integration tests.
#
#   docker compose -f test/db/docker-compose.test.yml up -d
#   TEST_DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:55432/qyrvia_test \
#     JWT_SECRET=local-dev-jwt-secret-at-least-32-characters npm run test:db
#   docker compose -f test/db/docker-compose.test.yml down -v
#
# Version pinned to 16-alpine to match the production target.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qyrvia_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qyrvia_test"]
      interval: 2s
      timeout: 3s
      retries: 30
